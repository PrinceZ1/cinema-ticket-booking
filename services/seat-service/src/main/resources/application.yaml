server:
  port: 8082

spring:
  application:
    name: seat-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/${DB_SEAT}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}


logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{traceId}] [%X{bookingId}] %-5level %logger{36} - %msg%n"
  level:
    com.cinema: DEBUG
